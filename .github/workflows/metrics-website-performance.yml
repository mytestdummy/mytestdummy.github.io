name: Metrics

on:
  page_build:
  schedule:
    - cron: '55 0 * * *'

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
            token: NOT_NEEDED
            plugin_pagespeed: yes
            plugin_pagespeed_url: mytestdummy.github.io
